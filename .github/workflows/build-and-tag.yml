name: Build and Tag

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 03:00 UTC
  push:
    branches:
      - main
      - stable
  pull_request:
    branches:
      - main
      - stable
  workflow_dispatch:

jobs:
  build-scan-push:
    uses: r0ps3c/gh-shared-workflows/.github/workflows/docker-build-scan-push.yml@15ab2265e381558dc7aad8afc1cf7cd3ad0ee3e6 # main
    with:
      image-ref: unbound-network:main
      version-extract-command: "apk info unbound 2>/dev/null | grep '^unbound-' | head -1 | cut -d- -f2 | cut -dr -f1"
      test-command: make test-structure && make test-standalone && make test-integration
    secrets: inherit
